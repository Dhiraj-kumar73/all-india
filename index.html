<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechEraX Hub | India's Mega Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- hello -->
    <nav class="navbar">
    <div class="logo" onclick="location.reload()">TechEraX <span>Hub</span></div>
    
    <div class="nav-right">
        <button class="upload-btn" onclick="openUpload()">Upload Notes</button>
        
        <button id="theme-toggle" class="theme-btn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
</nav>

<div class="progress-container">
    <div class="progress-bar" id="myBar"></div>
</div>

    <header class="hero" id="heroSec">
        <h1>All India University Portal</h1>
        <p>Bharat ki 100+ Universities ke Syllabus aur Notes yahan milenge.</p>
        
        <div class="search-area">
            <div class="search-box">
                <i class="fa-solid fa-university"></i>
                <input type="text" id="uInput" placeholder="Apni University Search karein (AKU, DU, PPU...)" onkeyup="filterUniv()" onclick="showUniv()">
                <ul id="uList" class="univ-list"></ul>
            </div>
        </div>
        <p id="status" style="margin-top:15px; font-weight:bold; color:#fbbf24;">Select University to Start</p>
    </header>

    <main class="container">
        <section id="univPortal" style="display:none;">
            <button class="back-btn" onclick="location.reload()"><i class="fa-solid fa-arrow-left"></i> Change University</button>
            <div class="portal-header">
                <h1 id="pName">University Name</h1>
                <p id="pState">Location Details</p>
            </div>
            <h2 class="section-title">Available Courses</h2>
            <div class="grid" id="portalCourseGrid"></div>
        </section>

        <section id="detailView" style="display:none;">
            <button class="back-btn" onclick="backToPortal()"><i class="fa-solid fa-arrow-left"></i> Back to Courses</button>
            <h2 id="viewTitle" class="section-title"></h2>
            <div class="grid" id="detailGrid"></div>
        </section>

        <div id="courseView">
            <h2 class="section-title">Our Top Courses</h2>
            <div class="grid" id="mainCourseGrid"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 TechEraX Hub - Created by Dhiraj Kumar (Patna)</p>
    </footer>

    <button id="backToTop" class="back-to-top">
    <i class="fa-solid fa-arrow-up"></i>
</button>
<!--social  -->
<div class="social-float">
    <a href="https://wa.me/7367807523" class="social-item whatsapp" target="_blank" title="WhatsApp Us">
        <i class="fa-brands fa-whatsapp"></i>
    </a>
    <a href="https://facebook.com/your-page" class="social-item facebook" target="_blank" title="Follow on Facebook">
        <i class="fa-brands fa-facebook-f"></i>
    </a>
    <a href="https://instagram.com/your-profile" class="social-item instagram" target="_blank" title="Follow on Instagram">
        <i class="fa-brands fa-instagram"></i>
    </a>
</div>

    <script src="script.js"></script>
</body>
</html>
